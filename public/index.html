<!DOCTYPE html>
<html>
<head>
    <title>CI/CD Full Stack Project</title>
</head>
<body>

    <h1>Frontend + Backend CI/CD Project</h1>

    <button onclick="getMessage()">
        Call Backend
    </button>

    <h2 id="result"></h2>

    <script>
        async function getMessage() {

            const response =
            await fetch('/api/message');

            const data =
            await response.json();

            document.getElementById("result")
            .innerText = data.message;
        }
    </script>

</body>
</html>
